name: Publish to NuGet & GitHub Packages

on:
  push:
    tags: [ 'v*' ]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Pack ACSync.Core
        run: dotnet pack .\ACSync.Core\ACSync.Core.csproj -c Release -o .\publish

      - name: Push ACSync.Core to NuGet.org
        run: dotnet nuget push .\publish\ACSync.Core.*.nupkg
             --api-key ${{ secrets.NUGET_API_KEY }}
             --source https://api.nuget.org/v3/index.json
             --skip-duplicate

      - name: Pack ACSync.CLI
        run: dotnet pack .\ACSync.CLI\ACSync.CLI.csproj -c Release -o .\publish

      - name: Push ACSync.CLI to NuGet.org
        run: dotnet nuget push .\publish\ACSync.CLI.*.nupkg
             --api-key ${{ secrets.NUGET_API_KEY }}
             --source https://api.nuget.org/v3/index.json
             --skip-duplicate

      - name: Push to GitHub Packages
        run: dotnet nuget push .\publish\*.nupkg
             --api-key ${{ secrets.GITHUB_TOKEN }}
             --source https://nuget.pkg.github.com/${{ github.repository_owner }}/
             --skip-duplicate
